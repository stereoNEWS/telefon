<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Gyro Sync</title>
    
    <!-- Базовый Three.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <!-- Модуль для скругленных углов (Фаски) -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/RoundedBoxGeometry.js"></script>
    
    <!-- Сеть и QR -->
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');

        body { 
            margin: 0; overflow: hidden; background-color: #030303; 
            color: #fff; font-family: 'Inter', sans-serif;
            background-image: radial-gradient(circle at 50% 50%, #1a1a24 0%, #030303 100%);
        }

        /* UI ПК */
        .glass-panel {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; text-align: center;
            background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 50px; border-radius: 30px; 
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8), inset 0 1px 0 rgba(255,255,255,0.1);
            transition: opacity 0.6s cubic-bezier(0.16, 1, 0.3, 1), transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 10;
        }

        #pc-active { display: none; opacity: 0; transform: translate(-50%, -45%); pointer-events: none; }
        
        #qrcode { 
            background: #fff; padding: 20px; border-radius: 20px; margin-bottom: 25px; 
            min-width: 200px; min-height: 200px; display: flex; justify-content: center; 
            align-items: center; color: #000; font-weight: 600; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        h1 { margin: 0 0 12px 0; font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        p { margin: 0; color: #888; font-size: 15px; font-weight: 300; }
        
        .status-dot { display: inline-block; width: 8px; height: 8px; background: #00e676; border-radius: 50%; margin-right: 8px; box-shadow: 0 0 10px #00e676; animation: pulse 2s infinite; }
        .green-text { color: #00e676; font-weight: 400; font-size: 15px; margin-top: 20px; letter-spacing: 0.5px; }

        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }

        /* UI Телефона */
        #phone-ui {
            display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column; justify-content: center; align-items: center;
            background: #030303; z-index: 20;
        }

        .phone-circle {
            width: 250px; height: 250px; border-radius: 50%;
            background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.02));
            display: flex; justify-content: center; align-items: center;
            border: 1px solid rgba(255,255,255,0.05); box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            position: relative;
        }

        .btn {
            background: #fff; color: #000; border: none; padding: 20px 40px;
            font-size: 16px; font-weight: 600; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease; letter-spacing: 1px; text-transform: uppercase;
            box-shadow: 0 10px 30px rgba(255,255,255,0.2); position: absolute;
        }
        .btn:active { transform: scale(0.94); }
        .btn:disabled { background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.3); box-shadow: none; cursor: not-allowed; }

        #phone-status { margin-top: 40px; font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 2px; }
        #phone-status strong { color: #fff; }
    </style>
</head>
<body>

    <!-- UI ПК Ожидание -->
    <div id="pc-ui" class="glass-panel">
        <div id="qrcode">⏳ Создание P2P...</div>
        <h1>Подключение</h1>
        <p>Наведите камеру смартфона</p>
    </div>
    
    <!-- UI ПК Подключено -->
    <div id="pc-active" class="glass-panel">
        <h1><span class="status-dot"></span>Синхронизировано</h1>
        <p>Вращайте телефон в пространстве</p>
        <div id="p2p-status" class="green-text">Шифрованный канал установлен</div>
    </div>

    <!-- UI Телефона -->
    <div id="phone-ui">
        <div class="phone-circle">
            <button class="btn" id="start-btn" disabled>Ожидание ПК</button>
        </div>
        <div id="phone-status">Система: <strong>Подключение...</strong></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const peerIdToConnect = urlParams.get('peer');
        const isPhone = peerIdToConnect !== null;

        const peer = new Peer({ debug: 1 });

        if (!isPhone) {
            // ======================== СТУДИЙНЫЙ ПК РЕЖИМ ========================
            const qrcodeEl = document.getElementById("qrcode");
            const pcUi = document.getElementById('pc-ui');
            const pcActiveUi = document.getElementById('pc-active');
            let scene, camera, renderer, ingot;
            let targetQuaternion = new THREE.Quaternion();
            let isConnected = false;

            function initPremium3D() {
                scene = new THREE.Scene();
                
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.set(0, 0, 7);

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Оптимизация
                
                // КИНЕМАТОГРАФИЧНЫЙ РЕНДЕР
                renderer.toneMapping = THREE.ACESFilmicToneMapping;
                renderer.toneMappingExposure = 1.2;
                renderer.outputEncoding = THREE.sRGBEncoding;
                document.body.appendChild(renderer.domElement);

                // ФОРМА: Дорогой прямоугольный слиток со скругленными краями
                // Ширина 3, Высота 1.5, Глубина 0.8. Сегментов 6, радиус скругления 0.15
                const geometry = new THREE.RoundedBoxGeometry(3, 1.5, 0.6, 6, 0.15);
                
                // МАТЕРИАЛ: Темный Титан / Обсидиан
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0x111111,          // Темно-серый
                    metalness: 1.0,           // 100% металл
                    roughness: 0.2,           // Слегка матовый
                    clearcoat: 1.0,           // Эффект лака
                    clearcoatRoughness: 0.05, // Гладкий лак
                    reflectivity: 1.0
                });

                ingot = new THREE.Mesh(geometry, material);
                scene.add(ingot);

                // СТУДИЙНЫЙ СВЕТ (Studio Lighting Setup)
                // 1. Рисующий свет (Key Light) - холодный белый
                const keyLight = new THREE.DirectionalLight(0xffffff, 3);
                keyLight.position.set(5, 5, 5);
                scene.add(keyLight);

                // 2. Заполняющий свет (Fill Light) - мягкий синеватый
                const fillLight = new THREE.DirectionalLight(0x4488ff, 1.5);
                fillLight.position.set(-5, 0, 5);
                scene.add(fillLight);

                // 3. Контровой свет (Rim Light) - яркий бирюзовый для подсветки фасок
                const rimLight = new THREE.DirectionalLight(0x00ffaa, 5);
                rimLight.position.set(0, 5, -5);
                scene.add(rimLight);

                // Легкий фоновый свет для теней
                scene.add(new THREE.AmbientLight(0xffffff, 0.2));

                animate();
            }

            function animate() { 
                requestAnimationFrame(animate); 
                
                if (ingot) {
                    if (!isConnected) {
                        // Анимация парения пока телефон не подключен
                        const time = Date.now() * 0.001;
                        ingot.rotation.y = Math.sin(time * 0.5) * 0.3;
                        ingot.rotation.x = Math.cos(time * 0.3) * 0.2;
                        ingot.position.y = Math.sin(time * 2) * 0.1;
                    } else {
                        // Плавное следование за телефоном
                        ingot.quaternion.slerp(targetQuaternion, 0.15); 
                        // Возвращаем в центр, если парил
                        ingot.position.lerp(new THREE.Vector3(0,0,0), 0.1); 
                    }
                }
                renderer.render(scene, camera); 
            }

            window.addEventListener('resize', () => { 
                if(camera && renderer) { 
                    camera.aspect = window.innerWidth / window.innerHeight; 
                    camera.updateProjectionMatrix(); 
                    renderer.setSize(window.innerWidth, window.innerHeight); 
                }
            });

            // Настройка P2P ПК
            peer.on('error', (err) => qrcodeEl.innerHTML = `<span style="color: red; font-size:14px;">Ошибка P2P. Нужен VPN</span>`);

            peer.on('open', (id) => {
                qrcodeEl.innerHTML = "";
                const connectUrl = window.location.href.split('?')[0] + '?peer=' + id;
                new QRCode(qrcodeEl, { 
                    text: connectUrl, width: 200, height: 200, 
                    colorDark : "#000000", colorLight : "#ffffff", correctLevel : QRCode.CorrectLevel.H 
                });
                initPremium3D();
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => console.log("Канал открыт"));

                conn.on('data', (data) => {
                    if (data.type === 'HELLO_FROM_PHONE') {
                        conn.send({ type: 'PC_READY_TO_RECEIVE' });
                        isConnected = true;
                        
                        // Плавная смена UI
                        pcUi.style.opacity = '0';
                        pcUi.style.transform = 'translate(-50%, -55%)';
                        setTimeout(() => {
                            pcUi.style.display = 'none';
                            pcActiveUi.style.display = 'flex';
                            setTimeout(() => {
                                pcActiveUi.style.opacity = '1';
                                pcActiveUi.style.transform = 'translate(-50%, -50%)';
                            }, 50);
                        }, 600);
                    }

                    if (data.type === 'gyro') {
                        const alpha = THREE.MathUtils.degToRad(data.alpha || 0);
                        const beta = THREE.MathUtils.degToRad(data.beta || 0);
                        const gamma = THREE.MathUtils.degToRad(data.gamma || 0);
                        const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
                        targetQuaternion.setFromEuler(euler);
                    }
                });
            });

        } else {
            // ======================== ТЕЛЕФОН РЕЖИМ ========================
            document.getElementById('phone-ui').style.display = 'flex';
            const statusEl = document.getElementById('phone-status').querySelector('strong');
            const btn = document.getElementById('start-btn');
            let conn, pcLinked = false;

            peer.on('error', () => { statusEl.innerText = "ОШИБКА СЕТИ"; statusEl.style.color = "#ff4444"; });

            peer.on('open', () => {
                statusEl.innerText = "ПОИСК СТАНЦИИ...";
                conn = peer.connect(peerIdToConnect, { reliable: true });

                conn.on('open', () => conn.send({ type: 'HELLO_FROM_PHONE' }));

                conn.on('data', (data) => {
                    if (data.type === 'PC_READY_TO_RECEIVE') {
                        statusEl.innerText = "СИНХРОНИЗИРОВАНО";
                        statusEl.style.color = "#00e676";
                        pcLinked = true;
                        btn.disabled = false; 
                        btn.innerText = "СТАРТ";
                        btn.style.background = "#00e676";
                        btn.style.color = "#000";
                    }
                });
            });

            btn.addEventListener('click', () => {
                if (!pcLinked) return;
                
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => { if (permissionState === 'granted') startGyro(); else statusEl.innerText = "ОТКАЗАНО В ДОСТУПЕ"; })
                        .catch(console.error);
                } else { startGyro(); }
            });

            function startGyro() {
                btn.innerText = "АКТИВНО";
                btn.style.background = "transparent";
                btn.style.border = "2px solid #00e676";
                btn.style.color = "#00e676";
                btn.disabled = true;

                window.addEventListener('deviceorientation', (event) => {
                    if (conn && conn.open && pcLinked) {
                        conn.send({ type: 'gyro', alpha: event.alpha, beta: event.beta, gamma: event.gamma });
                    }
                }, true);
            }
        }
    </script>
</body>
</html>
