<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>3D Gyro Sync</title>
    
    <!-- Подключаем библиотеки -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050507;
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, sans-serif;
        }

        #pc-ui {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            transition: opacity 0.5s ease;
            z-index: 10;
            text-align: center;
        }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 20px;
            min-width: 200px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: bold;
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; }
        p { margin: 0; color: #aaa; font-size: 14px; }

        #status {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 14px;
            color: #00ffaa;
            z-index: 10;
            display: none;
            letter-spacing: 2px;
        }

        #phone-ui {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: 20;
        }

        .btn {
            background: #00ffaa;
            color: #000;
            border: none;
            padding: 20px 40px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 255, 170, 0.4);
            cursor: pointer;
        }

        #phone-status { margin-top: 20px; font-size: 16px; color: rgba(255,255,255,0.7); }
    </style>
</head>
<body>

    <div id="pc-ui">
        <div id="qrcode">⏳ Соединение с сервером...</div>
        <h1>Отсканируйте код</h1>
        <p>Используйте камеру телефона для подключения</p>
    </div>
    <div id="status">● Подключено (WebRTC P2P)</div>

    <div id="phone-ui">
        <button class="btn" id="start-btn">Подключить гироскоп</button>
        <div id="phone-status">Ожидание...</div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const peerIdToConnect = urlParams.get('peer');
        const isPhone = peerIdToConnect !== null;

        // Создаем соединение (используем надежный бесплатный сервер по умолчанию)
        const peer = new Peer({
            debug: 2
        });

        if (!isPhone) {
            let cube, scene, camera, renderer;
            let targetQuaternion = new THREE.Quaternion();

            function init3D() {
                scene = new THREE.Scene();
                camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
                camera.position.z = 6;

                renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);
                document.body.appendChild(renderer.domElement);

                const geometry = new THREE.BoxGeometry(2, 2, 2);
                const material = new THREE.MeshPhysicalMaterial({
                    color: 0x111111, metalness: 0.9, roughness: 0.1, 
                    clearcoat: 1.0, emissive: 0x00ffaa, emissiveIntensity: 0.1
                });

                cube = new THREE.Mesh(geometry, material);
                scene.add(cube);

                scene.add(new THREE.AmbientLight(0xffffff, 0.5));
                
                const light1 = new THREE.PointLight(0x00ffaa, 2, 50);
                light1.position.set(5, 5, 5);
                scene.add(light1);

                const light2 = new THREE.PointLight(0xff0055, 2, 50);
                light2.position.set(-5, -5, 5);
                scene.add(light2);

                const grid = new THREE.GridHelper(20, 20, 0x00ffaa, 0x222222);
                grid.position.y = -2;
                grid.material.opacity = 0.2;
                grid.material.transparent = true;
                scene.add(grid);

                animate();
            }

            function animate() {
                requestAnimationFrame(animate);
                if (cube) cube.quaternion.slerp(targetQuaternion, 0.15); 
                renderer.render(scene, camera);
            }

            window.addEventListener('resize', () => {
                if(camera && renderer) {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                }
            });

            const qrcodeEl = document.getElementById("qrcode");

            // ОШИБКА СЕРВЕРА
            peer.on('error', (err) => {
                console.error(err);
                qrcodeEl.innerHTML = `<span style="color: red; text-align: center;">Ошибка сети!<br>Попробуй выключить AdBlock или обновить страницу.</span>`;
            });

            // УСПЕШНОЕ ПОДКЛЮЧЕНИЕ
            peer.on('open', (id) => {
                qrcodeEl.innerHTML = ""; // Убираем текст загрузки
                const connectUrl = window.location.href.split('?')[0] + '?peer=' + id;
                
                try {
                    new QRCode(qrcodeEl, {
                        text: connectUrl,
                        width: 200,
                        height: 200,
                        colorDark : "#000000",
                        colorLight : "#ffffff",
                        correctLevel : QRCode.CorrectLevel.H
                    });
                    init3D();
                } catch(e) {
                    qrcodeEl.innerHTML = `<span style="color: red;">Ошибка QR-генератора!</span>`;
                }
            });

            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    document.getElementById('pc-ui').style.opacity = '0';
                    setTimeout(() => document.getElementById('pc-ui').style.display = 'none', 500);
                    document.getElementById('status').style.display = 'block';
                });

                conn.on('data', (data) => {
                    if (data.type === 'gyro') {
                        const alpha = THREE.MathUtils.degToRad(data.alpha || 0);
                        const beta = THREE.MathUtils.degToRad(data.beta || 0);
                        const gamma = THREE.MathUtils.degToRad(data.gamma || 0);
                        const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
                        targetQuaternion.setFromEuler(euler);
                    }
                });
            });

        } else {
            document.getElementById('phone-ui').style.display = 'flex';
            const statusEl = document.getElementById('phone-status');
            const btn = document.getElementById('start-btn');
            
            let conn;

            peer.on('error', (err) => {
                statusEl.innerText = "Ошибка подключения к ПК!";
                statusEl.style.color = "red";
            });

            peer.on('open', () => {
                statusEl.innerText = "Установка связи P2P...";
                conn = peer.connect(peerIdToConnect);

                conn.on('open', () => {
                    statusEl.innerText = "Связь установлена! Нажмите кнопку.";
                });
            });

            btn.addEventListener('click', () => {
                if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                    DeviceOrientationEvent.requestPermission()
                        .then(permissionState => {
                            if (permissionState === 'granted') startGyro();
                            else statusEl.innerText = "Доступ к гироскопу запрещен.";
                        })
                        .catch(console.error);
                } else {
                    startGyro();
                }
            });

            function startGyro() {
                btn.style.display = 'none';
                statusEl.innerText = "🔴 Идет передача движений...";
                statusEl.style.color = "#00ffaa";

                window.addEventListener('deviceorientation', (event) => {
                    if (conn && conn.open) {
                        conn.send({
                            type: 'gyro',
                            alpha: event.alpha,
                            beta: event.beta,
                            gamma: event.gamma
                        });
                    }
                }, true);
            }
        }
    </script>
</body>
</html>
